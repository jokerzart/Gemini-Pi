<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeminiPi ハードウェア接続図</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px 20px 60px}
h1{font-family:'Orbitron',monospace;font-size:18px;color:#4dc8ff;letter-spacing:.2em;margin-bottom:6px;text-align:center}
.sub{font-size:10px;color:#3a6a8a;letter-spacing:.2em;margin-bottom:30px;font-family:'Orbitron',monospace;text-align:center}
svg{width:100%;max-width:800px;height:auto}

/* Fritzing-style colors */
.board{fill:#2d5016;stroke:#4a8a25;stroke-width:2}
.board-dark{fill:#1e3a0a;stroke:#3a7a15;stroke-width:1.5}
.usb-port{fill:#888;stroke:#555;stroke-width:1}
.usb-cable{fill:none;stroke-width:4;stroke-linecap:round}
.power-cable{fill:none;stroke-width:5;stroke-linecap:round}
.gpio-pin{fill:#c8a000;stroke:#a07800;stroke-width:1}
.component{fill:#1a3a5c;stroke:#2a6a9c;stroke-width:1.5}
.label{font-family:'Orbitron',monospace;font-size:10px}
.label-jp{font-family:'Noto Sans JP',sans-serif;font-size:10px}

@keyframes flow{0%{stroke-dashoffset:20}100%{stroke-dashoffset:0}}
@keyframes powerflow{0%{stroke-dashoffset:30}100%{stroke-dashoffset:0}}
.usb-data{stroke-dasharray:8 4;animation:flow 1s linear infinite}
.power-flow{stroke-dasharray:10 5;animation:powerflow 0.8s linear infinite}
</style>
</head>
<body>
<h1>GEMINIPI HARDWARE</h1>
<div class="sub">FRITZING-STYLE CONNECTION DIAGRAM</div>

<svg viewBox="0 0 800 580" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="shadow">
    <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.4"/>
  </filter>
  <filter id="glow">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- USB cable gradient -->
  <linearGradient id="usb-grad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#4dc8ff"/>
    <stop offset="100%" stop-color="#4dc8ff" stop-opacity="0.6"/>
  </linearGradient>
  <!-- Power cable gradient -->
  <linearGradient id="power-grad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#ff4444"/>
    <stop offset="100%" stop-color="#cc2222"/>
  </linearGradient>
  <!-- Board texture -->
  <pattern id="pcb-pattern" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
    <rect width="8" height="8" fill="#2d5016"/>
    <circle cx="4" cy="4" r="0.8" fill="#3d6a20" opacity="0.4"/>
  </pattern>
</defs>

<!-- ======== POWER ADAPTER ======== -->
<g filter="url(#shadow)" transform="translate(20, 60)">
  <!-- Adapter body -->
  <rect x="0" y="20" width="80" height="100" rx="8" fill="#2a2a2a" stroke="#444" stroke-width="2"/>
  <rect x="8" y="28" width="64" height="50" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <!-- LED indicator -->
  <circle cx="40" cy="88" r="5" fill="#00ff44" opacity="0.8" filter="url(#glow)"/>
  <!-- Prongs -->
  <rect x="25" y="120" width="8" height="20" rx="2" fill="#888" stroke="#666" stroke-width="1"/>
  <rect x="47" y="120" width="8" height="20" rx="2" fill="#888" stroke="#666" stroke-width="1"/>
  <!-- Label -->
  <text x="40" y="15" text-anchor="middle" class="label" fill="#ffaa44" font-size="9">5V / 2.5A</text>
  <text x="40" y="158" text-anchor="middle" class="label-jp" fill="#aaaaaa" font-size="9">電源アダプター</text>
  <!-- Micro USB connector on adapter -->
  <rect x="28" y="108" width="24" height="10" rx="3" fill="#555" stroke="#444" stroke-width="1"/>
  <text x="40" y="116" text-anchor="middle" font-size="6" fill="#888" font-family="monospace">μUSB</text>
</g>

<!-- ======== POWER CABLE ======== -->
<!-- Red power wire -->
<path d="M 80 118 Q 140 118 140 200 Q 140 240 195 240"
  stroke="#ff4444" stroke-width="4" fill="none" stroke-linecap="round"
  class="power-flow" stroke-dasharray="10 5"/>
<!-- Black ground wire -->
<path d="M 80 122 Q 145 122 145 205 Q 145 248 195 248"
  stroke="#333333" stroke-width="4" fill="none" stroke-linecap="round"
  class="power-flow" stroke-dasharray="10 5"/>

<!-- Power label -->
<text x="118" y="170" text-anchor="middle" class="label" fill="#ff4444" font-size="9">5V DC</text>
<text x="118" y="182" text-anchor="middle" class="label" fill="#333" font-size="9">GND</text>

<!-- ======== RASPBERRY PI 3 (CENTER) ======== -->
<g filter="url(#shadow)" transform="translate(195, 160)">
  <!-- PCB Board -->
  <rect x="0" y="0" width="240" height="160" rx="6" fill="url(#pcb-pattern)" stroke="#4a8a25" stroke-width="2.5"/>
  <!-- Board outline highlight -->
  <rect x="0" y="0" width="240" height="160" rx="6" fill="none" stroke="#6ab835" stroke-width="1" opacity="0.5"/>

  <!-- GPIO Header (40 pins) -->
  <g transform="translate(8, 8)">
    <rect x="0" y="0" width="224" height="20" rx="2" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <!-- Pin dots -->
    <g fill="#c8a000">
      <!-- Row 1 -->
      <circle cx="8" cy="7" r="2.5"/><circle cx="20" cy="7" r="2.5"/><circle cx="32" cy="7" r="2.5"/>
      <circle cx="44" cy="7" r="2.5"/><circle cx="56" cy="7" r="2.5"/><circle cx="68" cy="7" r="2.5"/>
      <circle cx="80" cy="7" r="2.5"/><circle cx="92" cy="7" r="2.5"/><circle cx="104" cy="7" r="2.5"/>
      <circle cx="116" cy="7" r="2.5"/><circle cx="128" cy="7" r="2.5"/><circle cx="140" cy="7" r="2.5"/>
      <circle cx="152" cy="7" r="2.5"/><circle cx="164" cy="7" r="2.5"/><circle cx="176" cy="7" r="2.5"/>
      <circle cx="188" cy="7" r="2.5"/><circle cx="200" cy="7" r="2.5"/><circle cx="212" cy="7" r="2.5"/>
      <!-- Row 2 -->
      <circle cx="8" cy="14" r="2.5"/><circle cx="20" cy="14" r="2.5"/><circle cx="32" cy="14" r="2.5"/>
      <circle cx="44" cy="14" r="2.5"/><circle cx="56" cy="14" r="2.5"/><circle cx="68" cy="14" r="2.5"/>
      <circle cx="80" cy="14" r="2.5"/><circle cx="92" cy="14" r="2.5"/><circle cx="104" cy="14" r="2.5"/>
      <circle cx="116" cy="14" r="2.5"/><circle cx="128" cy="14" r="2.5"/><circle cx="140" cy="14" r="2.5"/>
      <circle cx="152" cy="14" r="2.5"/><circle cx="164" cy="14" r="2.5"/><circle cx="176" cy="14" r="2.5"/>
      <circle cx="188" cy="14" r="2.5"/><circle cx="200" cy="14" r="2.5"/><circle cx="212" cy="14" r="2.5"/>
    </g>
    <text x="112" y="32" text-anchor="middle" class="label" fill="#c8a000" font-size="7">GPIO 40PIN</text>
  </g>

  <!-- CPU chip -->
  <rect x="85" y="48" width="70" height="60" rx="4" fill="#111" stroke="#444" stroke-width="1.5"/>
  <rect x="90" y="53" width="60" height="50" rx="2" fill="#1a1a1a"/>
  <text x="120" y="76" text-anchor="middle" class="label" fill="#888" font-size="8">BCM2837</text>
  <text x="120" y="89" text-anchor="middle" class="label" fill="#666" font-size="7">ARM Cortex-A53</text>
  <text x="120" y="100" text-anchor="middle" class="label" fill="#666" font-size="7">1.2GHz 64-bit</text>

  <!-- USB ports (right side) -->
  <g transform="translate(200, 40)">
    <!-- USB port 1 -->
    <rect x="0" y="0" width="40" height="18" rx="3" fill="#555" stroke="#444" stroke-width="1.5"/>
    <rect x="3" y="3" width="34" height="12" rx="2" fill="#222"/>
    <text x="20" y="13" text-anchor="middle" font-size="7" fill="#888" font-family="monospace">USB</text>
    <!-- USB port 2 -->
    <rect x="0" y="22" width="40" height="18" rx="3" fill="#555" stroke="#444" stroke-width="1.5"/>
    <rect x="3" y="25" width="34" height="12" rx="2" fill="#222"/>
    <text x="20" y="35" text-anchor="middle" font-size="7" fill="#888" font-family="monospace">USB</text>
    <!-- USB port 3 (AT-CSP1接続中) -->
    <rect x="0" y="44" width="40" height="18" rx="3" fill="#4dc8ff" stroke="#2a9acc" stroke-width="2"/>
    <rect x="3" y="47" width="34" height="12" rx="2" fill="#1a4a6a"/>
    <text x="20" y="57" text-anchor="middle" font-size="7" fill="#4dc8ff" font-family="monospace">USB</text>
    <text x="48" y="57" class="label-jp" fill="#4dc8ff" font-size="8">← AT-CSP1</text>
  </g>

  <!-- Micro USB power port (left side) -->
  <g transform="translate(-14, 60)">
    <rect x="0" y="0" width="14" height="22" rx="2" fill="#ff4444" stroke="#cc2222" stroke-width="1.5"/>
    <rect x="2" y="3" width="10" height="16" rx="1" fill="#1a0000"/>
    <text x="7" y="30" text-anchor="middle" font-size="7" fill="#ff4444" font-family="monospace">PWR</text>
  </g>

  <!-- Ethernet port -->
  <g transform="translate(200, 110)">
    <rect x="0" y="0" width="40" height="26" rx="3" fill="#444" stroke="#333" stroke-width="1.5"/>
    <rect x="3" y="3" width="34" height="20" rx="2" fill="#222"/>
    <circle cx="10" cy="20" r="2" fill="#00ff44" opacity="0.6"/>
    <circle cx="30" cy="20" r="2" fill="#ffaa00" opacity="0.6"/>
    <text x="20" y="14" text-anchor="middle" font-size="7" fill="#888" font-family="monospace">LAN</text>
  </g>

  <!-- MicroSD slot -->
  <g transform="translate(60, 148)">
    <rect x="0" y="0" width="50" height="12" rx="3" fill="#888" stroke="#666" stroke-width="1"/>
    <rect x="2" y="2" width="46" height="8" rx="2" fill="#555"/>
    <text x="25" y="24" text-anchor="middle" class="label" fill="#aaaaaa" font-size="7">microSD</text>
  </g>

  <!-- HDMI port -->
  <g transform="translate(150, 148)">
    <rect x="0" y="0" width="36" height="12" rx="2" fill="#555" stroke="#444" stroke-width="1"/>
    <text x="18" y="24" text-anchor="middle" class="label" fill="#aaaaaa" font-size="7">HDMI</text>
  </g>

  <!-- Board label -->
  <text x="42" y="82" text-anchor="middle" class="label" fill="#6ab835" font-size="9" font-weight="700">Raspberry</text>
  <text x="42" y="94" text-anchor="middle" class="label" fill="#6ab835" font-size="9" font-weight="700">Pi 3 B+</text>

  <!-- Wi-Fi chip indicator -->
  <rect x="8" y="112" width="60" height="30" rx="3" fill="#111" stroke="#2a5a9a" stroke-width="1"/>
  <text x="38" y="124" text-anchor="middle" class="label" fill="#4dc8ff" font-size="7">Wi-Fi</text>
  <text x="38" y="135" text-anchor="middle" class="label" fill="#4466aa" font-size="6">802.11n</text>
</g>

<!-- ======== USB CABLE (Pi → AT-CSP1) ======== -->
<!-- USB Type-A cable -->
<path d="M 435 253 Q 520 253 520 340 Q 520 390 490 390"
  stroke="#4dc8ff" stroke-width="5" fill="none" stroke-linecap="round"
  class="usb-data"/>
<!-- Cable label -->
<text x="520" y="310" text-anchor="middle" class="label" fill="#4dc8ff" font-size="9">USB</text>
<text x="520" y="322" text-anchor="middle" class="label" fill="#4dc8ff" font-size="9">Type-A</text>
<!-- Data arrows -->
<text x="548" y="355" class="label-jp" fill="#4dc8ff" font-size="8">音声データ</text>
<text x="548" y="368" class="label-jp" fill="#00e5a0" font-size="8">音声再生</text>

<!-- ======== AT-CSP1 SPEAKERPHONE ======== -->
<g filter="url(#shadow)" transform="translate(300, 350)">
  <!-- Main body - circular speakerphone -->
  <ellipse cx="95" cy="70" rx="90" ry="65" fill="#1a1a1a" stroke="#333" stroke-width="2.5"/>
  <ellipse cx="95" cy="70" rx="82" ry="57" fill="#111" stroke="#222" stroke-width="1"/>

  <!-- Speaker grille (dots) -->
  <g fill="#333" opacity="0.8">
    <!-- Concentric rings of dots -->
    <circle cx="95" cy="70" r="2.5" fill="#444"/>
    <!-- Ring 1 -->
    <circle cx="107" cy="70" r="2"/><circle cx="83" cy="70" r="2"/>
    <circle cx="101" cy="60" r="2"/><circle cx="89" cy="60" r="2"/>
    <circle cx="101" cy="80" r="2"/><circle cx="89" cy="80" r="2"/>
    <!-- Ring 2 -->
    <circle cx="119" cy="70" r="2"/><circle cx="71" cy="70" r="2"/>
    <circle cx="115" cy="57" r="2"/><circle cx="75" cy="57" r="2"/>
    <circle cx="115" cy="83" r="2"/><circle cx="75" cy="83" r="2"/>
    <circle cx="107" cy="50" r="2"/><circle cx="83" cy="50" r="2"/>
    <circle cx="107" cy="90" r="2"/><circle cx="83" cy="90" r="2"/>
    <!-- Ring 3 -->
    <circle cx="131" cy="70" r="2"/><circle cx="59" cy="70" r="2"/>
    <circle cx="127" cy="54" r="2"/><circle cx="63" cy="54" r="2"/>
    <circle cx="127" cy="86" r="2"/><circle cx="63" cy="86" r="2"/>
    <circle cx="119" cy="44" r="2"/><circle cx="71" cy="44" r="2"/>
    <circle cx="119" cy="96" r="2"/><circle cx="71" cy="96" r="2"/>
  </g>

  <!-- Microphone indicator (center) -->
  <circle cx="95" cy="70" r="18" fill="#1a1a1a" stroke="#4dc8ff" stroke-width="1.5"/>
  <rect x="88" y="58" width="14" height="20" rx="7" fill="none" stroke="#4dc8ff" stroke-width="1.5"/>
  <path d="M 84 72 Q 84 82 95 82 Q 106 82 106 72" fill="none" stroke="#4dc8ff" stroke-width="1.5"/>
  <line x1="95" y1="82" x2="95" y2="88" stroke="#4dc8ff" stroke-width="1.5"/>

  <!-- USB connector on bottom -->
  <rect x="75" y="128" width="40" height="14" rx="4" fill="#555" stroke="#444" stroke-width="1.5"/>
  <rect x="78" y="131" width="34" height="8" rx="2" fill="#222"/>
  <text x="95" y="139" text-anchor="middle" font-size="7" fill="#888" font-family="monospace">USB-A</text>

  <!-- LED indicator ring -->
  <circle cx="95" cy="70" r="50" fill="none" stroke="#4dc8ff" stroke-width="1" opacity="0.3" stroke-dasharray="4 4"/>

  <!-- Mute button -->
  <circle cx="148" cy="50" r="10" fill="#222" stroke="#444" stroke-width="1.5"/>
  <text x="148" y="54" text-anchor="middle" font-size="7" fill="#888" font-family="monospace">MUT</text>

  <!-- Volume buttons -->
  <circle cx="148" cy="90" r="8" fill="#222" stroke="#444" stroke-width="1.5"/>
  <text x="148" y="94" text-anchor="middle" font-size="10" fill="#888">+</text>

  <!-- Labels -->
  <text x="95" y="158" text-anchor="middle" class="label" fill="#4dc8ff" font-size="10" font-weight="700">AT-CSP1</text>
  <text x="95" y="172" text-anchor="middle" class="label-jp" fill="#aaaaaa" font-size="9">スピーカーフォン</text>
</g>

<!-- ======== POWER SUPPLY LABEL AREA ======== -->
<g transform="translate(20, 420)">
  <rect x="0" y="0" width="160" height="80" rx="8" fill="#1a0a00" stroke="#ff4444" stroke-width="1.5" opacity="0.8"/>
  <text x="80" y="20" text-anchor="middle" class="label" fill="#ff4444" font-size="10" font-weight="700">電源仕様</text>
  <text x="80" y="36" text-anchor="middle" class="label-jp" fill="#ff8888" font-size="9">入力: 100-240V AC</text>
  <text x="80" y="50" text-anchor="middle" class="label-jp" fill="#ff8888" font-size="9">出力: 5V / 2.5A DC</text>
  <text x="80" y="64" text-anchor="middle" class="label-jp" fill="#ff8888" font-size="9">コネクタ: Micro USB</text>
</g>

<!-- ======== CONNECTION SUMMARY ======== -->
<g transform="translate(560, 60)">
  <rect x="0" y="0" width="220" height="200" rx="8" fill="#0a1a0a" stroke="#3a6a3a" stroke-width="1.5"/>
  <rect x="0" y="0" width="220" height="24" rx="8" fill="#1a3a1a" stroke="#3a6a3a" stroke-width="1"/>
  <text x="110" y="16" text-anchor="middle" class="label" fill="#6ab835" font-size="10" font-weight="700">接続まとめ</text>

  <!-- Connection items -->
  <g class="label-jp" font-size="9">
    <!-- Power -->
    <circle cx="16" cy="44" r="5" fill="#ff4444"/>
    <text x="28" y="48" fill="#ff8888">電源アダプター</text>
    <text x="28" y="60" fill="#ff4444" font-size="8">  5V/2.5A → Micro USB</text>

    <!-- USB AT-CSP1 -->
    <circle cx="16" cy="80" r="5" fill="#4dc8ff"/>
    <text x="28" y="84" fill="#aaddff">AT-CSP1</text>
    <text x="28" y="96" fill="#4dc8ff" font-size="8">  USB Type-A → USB Port</text>

    <!-- Wi-Fi -->
    <circle cx="16" cy="116" r="5" fill="#00e5a0"/>
    <text x="28" y="120" fill="#88ffcc">Wi-Fi 接続</text>
    <text x="28" y="132" fill="#00e5a0" font-size="8">  SSH / ダッシュボード</text>

    <!-- MicroSD -->
    <circle cx="16" cy="152" r="5" fill="#ffaa44"/>
    <text x="28" y="156" fill="#ffcc88">MicroSD</text>
    <text x="28" y="168" fill="#ffaa44" font-size="8">  OS + Python プログラム</text>

    <!-- No HDMI needed -->
    <circle cx="16" cy="188" r="5" fill="#555"/>
    <text x="28" y="192" fill="#888">HDMI: 未使用（SSH運用）</text>
  </g>
</g>

<!-- ======== LEGEND ======== -->
<g transform="translate(560, 280)">
  <rect x="0" y="0" width="220" height="130" rx="8" fill="#0a0a1a" stroke="#2a2a5a" stroke-width="1.5"/>
  <rect x="0" y="0" width="220" height="24" rx="8" fill="#1a1a3a" stroke="#2a2a5a" stroke-width="1"/>
  <text x="110" y="16" text-anchor="middle" class="label" fill="#4dc8ff" font-size="10" font-weight="700">凡例 / Legend</text>

  <line x1="16" y1="44" x2="50" y2="44" stroke="#ff4444" stroke-width="4" stroke-linecap="round"/>
  <text x="60" y="48" class="label-jp" fill="#ff8888" font-size="9">電源ライン (5V DC)</text>

  <line x1="16" y1="66" x2="50" y2="66" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <text x="60" y="70" class="label-jp" fill="#888" font-size="9">グランド (GND)</text>

  <line x1="16" y1="88" x2="50" y2="88" stroke="#4dc8ff" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 4"/>
  <text x="60" y="92" class="label-jp" fill="#4dc8ff" font-size="9">USB データライン</text>

  <line x1="16" y1="110" x2="50" y2="110" stroke="#00e5a0" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
  <text x="60" y="114" class="label-jp" fill="#00e5a0" font-size="9">Wi-Fi（無線）</text>
</g>

<!-- Wi-Fi signal indicator -->
<g transform="translate(355, 180)" opacity="0.6">
  <path d="M 0 20 Q 10 10 20 20" fill="none" stroke="#00e5a0" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M -6 26 Q 10 8 26 26" fill="none" stroke="#00e5a0" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M -12 32 Q 10 6 32 32" fill="none" stroke="#00e5a0" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <circle cx="10" cy="22" r="2" fill="#00e5a0"/>
  <text x="10" y="44" text-anchor="middle" font-size="8" fill="#00e5a0" font-family="monospace">Wi-Fi</text>
</g>

</svg>

<div style="margin-top:16px;text-align:center;font-family:'Orbitron',monospace;font-size:9px;color:#2a4a2a;letter-spacing:.15em">
  RASPBERRY PI 3 B+ · AT-CSP1 USB SPEAKERPHONE · 5V/2.5A POWER ADAPTER
</div>

</body>
</html>
