<style>

*{margin:0;padding:0;box-sizing:border-box}
body{background:#020818;color:#e0f0ff;font-family:'Noto Sans JP',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:30px 20px 60px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 15%,rgba(0,100,255,.07) 0%,transparent 55%),radial-gradient(ellipse at 85% 80%,rgba(0,200,150,.05) 0%,transparent 55%),radial-gradient(ellipse at 50% 50%,rgba(100,0,255,.03) 0%,transparent 70%);pointer-events:none}
h1{font-family:'Orbitron',monospace;font-size:clamp(16px,3vw,26px);letter-spacing:.3em;color:#4dc8ff;text-align:center;margin-bottom:6px;text-shadow:0 0 30px rgba(77,200,255,.4)}
.subtitle{font-size:11px;color:#3a6a8a;letter-spacing:.25em;text-align:center;margin-bottom:8px;font-family:'Orbitron',monospace}
.tagline{font-size:11px;color:#2a5a7a;text-align:center;margin-bottom:36px;letter-spacing:.1em}
.diagram{width:100%;max-width:1100px;position:relative}
svg{width:100%;height:auto;overflow:visible}

@keyframes floatUp{0%{transform:translateY(24px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes flow{0%{stroke-dashoffset:20}100%{stroke-dashoffset:0}}
@keyframes flowRev{0%{stroke-dashoffset:-20}100%{stroke-dashoffset:0}}
@keyframes glowPulse{0%,100%{filter:drop-shadow(0 0 6px rgba(77,200,255,.3))}50%{filter:drop-shadow(0 0 16px rgba(77,200,255,.8))}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes scan{0%{transform:translateY(0)}100%{transform:translateY(220px)}}
@keyframes redpulse{0%,100%{opacity:.4}50%{opacity:1}}

.n1{animation:floatUp .5s .1s ease both}
.n2{animation:floatUp .5s .2s ease both}
.n3{animation:floatUp .5s .3s ease both}
.n4{animation:floatUp .5s .4s ease both}
.n5{animation:floatUp .5s .5s ease both}
.n6{animation:floatUp .5s .6s ease both}
.n7{animation:floatUp .5s .7s ease both}
.n8{animation:floatUp .5s .8s ease both}
.n9{animation:floatUp .5s .9s ease both}

.fl{stroke-dasharray:7 4;animation:flow .9s linear infinite}
.flr{stroke-dasharray:7 4;animation:flowRev .9s linear infinite}
.fls{stroke-dasharray:4 5;animation:flow 1.4s linear infinite}
.flred{stroke-dasharray:6 4;animation:flow .6s linear infinite}
.center-glow{animation:glowPulse 2.5s ease-in-out infinite}
.pdot{animation:pulse 1.8s ease-in-out infinite}
.rdot{animation:redpulse 1s ease-in-out infinite}
.scan-line{animation:scan 3s linear infinite;opacity:.06}
</style>
</head>
